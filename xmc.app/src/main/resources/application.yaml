spring:
  datasource:
    url: jdbc:hsqldb:file:${user.database.dir};create=true;dataEncryption=true;crypt_key=${user.cryptKey};crypt_iv=${user.cryptIv};crypt_type=AES/CBC/PKCS5Padding
    username: "\"${user.name}\""
    password: ${user.password}
    hikari:
      auto-commit: false
  messages:
    basename: messages/messages
    encoding: ISO-8859-1
  main:
    banner-mode: 'off'
  jpa:
    open-in-view: true
    database-platform: org.hibernate.dialect.HSQLDialect
    show-sql: false
    generate-ddl: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: /db/changelog/db.changelog-master.xml

xmc:
  max-servicecalllog-lifetime-in-days: 365
