spring:
  messages:
    basename: messages/messages
    encoding: ISO-8859-1
  main:
    banner-mode: 'off'
  jpa:
    open-in-view: true
    show-sql: false
    generate-ddl: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: /db/changelog/db.changelog-master.xml

xmc:
  max-servicecalllog-lifetime-in-days: 365
